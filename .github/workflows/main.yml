name: Greeting Java

on:
  workflow_dispatch:

jobs:
  greeting-java-job:
    name: Greeting Java Job
    runs-on: self-hosted
    
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven Wrapper
        run: ./mvnw clean package -DskipTests

      - name: Deploy war file
        run: copy target\*.war F:\tools\tomcat-11\webapps
